---
name: llmAssistant
title: LLM Assistant
jrs: '1.1'

items:
  - name: instructions
    type: Html
    visible: true

  - name: validationReport
    type: Preformatted
    title: Input Validation
    visible: (showValidation)
    clearWith:
      - query
      - analysisType
      - outcomeVar
      - groupVar
      - predictorVars

  - name: descriptiveReport
    type: Preformatted
    title: Descriptive Analysis
    visible: (showDescriptive)
    clearWith:
      - query
      - analysisType
      - outcomeVar
      - groupVar
      - predictorVars

  - name: assumptionReport
    type: Preformatted
    title: Assumption Checking
    visible: (showAssumptions)
    clearWith:
      - query
      - analysisType
      - outcomeVar
      - groupVar
      - predictorVars

  - name: testReport
    type: Preformatted
    title: Statistical Test & Results
    visible: (showTest)
    clearWith:
      - query
      - analysisType
      - outcomeVar
      - groupVar
      - predictorVars

  - name: fullReport
    type: Preformatted
    title: Full Analysis Report
    clearWith:
      - query
      - analysisType
      - outcomeVar
      - groupVar
      - predictorVars

options:
  - name: data
    type: Data

  - name: query
    title: Analysis Query
    type: String
    default: ''
    description: >
      Describe what you want to analyse in plain English.
      Example: "Compare test scores between male and female students"

  - name: analysisType
    title: Analysis Type
    type: List
    options:
      - name: auto
        title: Auto-detect
      - name: t_test
        title: Independent t-test
      - name: anova
        title: One-way ANOVA
      - name: correlation
        title: Correlation
      - name: regression
        title: Linear Regression
      - name: chi_square
        title: Chi-square Test
      - name: descriptive
        title: Descriptive Statistics Only
    default: auto
    description: >
      Select the intended analysis type, or leave as Auto-detect to let the
      module infer from your query.

  - name: outcomeVar
    title: Outcome Variable
    type: Variable
    suggested:
      - continuous
    permitted:
      - numeric
    description: >
      The main dependent / outcome variable (numeric).

  - name: groupVar
    title: Grouping Variable
    type: Variable
    suggested:
      - nominal
      - ordinal
    permitted:
      - factor
    description: >
      Grouping variable for t-test, ANOVA, or chi-square (categorical).

  - name: predictorVars
    title: Predictor Variables
    type: Variables
    suggested:
      - continuous
    permitted:
      - numeric
      - factor
    description: >
      Predictor variables for regression or correlation analyses.

  - name: alpha
    title: Significance Level (α)
    type: Number
    min: 0.001
    max: 0.20
    default: 0.05
    description: >
      Significance threshold for hypothesis tests and assumption checks.

  - name: apiKey
    title: Gemini API Key (session only)
    type: String
    default: ''
    description: >
      Your Google Gemini API key. This value is held in memory only and is
      never written to disk or included in outputs.

  - name: showValidation
    title: Show Validation Report
    type: Bool
    default: true

  - name: showDescriptive
    title: Show Descriptive Report
    type: Bool
    default: true

  - name: showAssumptions
    title: Show Assumption Report
    type: Bool
    default: true

  - name: showTest
    title: Show Test Results
    type: Bool
    default: true
